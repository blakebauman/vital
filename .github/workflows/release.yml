name: Release

# Build the installable .plugin and attach it to a GitHub Release
# whenever a version tag (e.g. v0.8.0) is pushed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate plugin structure
        run: python3 scripts/validate.py

      - name: Build vital.plugin
        run: |
          zip -r vital.plugin . \
            -x ".git/*" \
               ".github/*" \
               "scripts/*" \
               "*.plugin" \
               "*.zip" \
               "*.tar.gz" \
               ".gitignore" \
               "CONTRIBUTING.md" \
               "AGENTS.md" \
               "*.DS_Store"
          echo "Built vital.plugin:"
          unzip -l vital.plugin | tail -3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vital.plugin
          generate_release_notes: true
